name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build & lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check for secrets in source
        run: |
          if grep -rn "ghp_\|sk-\|secret_" src/ server/ --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "ERROR: Possible hardcoded secret detected in source files"
            exit 1
          fi
          echo "No hardcoded secrets detected"
