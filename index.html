<!DOCTYPE html>
<html lang="en">
  <head>

    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" as="image" href="/logo.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="الأوتوماتيك" />

    <meta name="description" content="الأوتوماتيك اللبناني — نظام إدارة مطعم متكامل لنقاط البيع والطلبات والمطبخ والمخزون. Automatic Restaurant OS: manage orders, inventory, kitchen, and reports from one branded workspace." />
    <link rel="canonical" href="%VITE_APP_URL%" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_APP_URL%" />
    <meta property="og:title" content="الأوتوماتيك اللبناني · Automatic Restaurant OS" />
    <meta property="og:description" content="الأوتوماتيك اللبناني — نظام إدارة مطعم متكامل لنقاط البيع والطلبات والمطبخ والمخزون. Automatic Restaurant OS: manage orders, inventory, kitchen, and reports from one branded workspace." />
    <meta property="og:image" content="%VITE_APP_URL%/logo-full.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="الأوتوماتيك اللبناني · Automatic Restaurant OS" />
    <meta name="twitter:description" content="الأوتوماتيك اللبناني — نظام إدارة مطعم متكامل لنقاط البيع والطلبات والمطبخ والمخزون. Automatic Restaurant OS: manage orders, inventory, kitchen, and reports from one branded workspace." />
    <meta name="twitter:image" content="%VITE_APP_URL%/logo-full.png" />
    <style>
      /* Branded loading splash shown while the JS bundle loads. It is a sibling
         of #root (not a child) so React does not wipe it on mount — main.jsx
         fades it out and removes it once the app is ready. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background: #020617;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #app-splash.app-splash--hide {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .plate {
        background: #fff;
        border-radius: 28px;
        padding: 30px 40px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(8px) scale(0.98);
        animation: appSplashFadeIn 0.28s ease-out 0.05s forwards;
      }
      #app-splash img {
        display: block;
        width: min(62vw, 280px);
        height: auto;
      }
      #app-splash .app-name {
        opacity: 0;
        color: #f8fafc;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        animation: appSplashFadeIn 0.3s ease-out 0.22s forwards;
      }
      #app-splash .bar {
        width: 150px;
        height: 4px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.22);
        overflow: hidden;
      }
      #app-splash .bar::before {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 999px;
        background: #f97316;
        animation: appSplashBar 1.1s ease-in-out infinite;
      }
      /* Only revealed on a genuinely slow load (fades in after 2s). */
      #app-splash .loading-msg {
        min-height: 1.2em;
        color: #94a3b8;
        font-size: 0.875rem;
        opacity: 0;
        animation: appSplashFadeIn 0.5s ease-out 2s forwards;
      }
      #app-splash .version {
        position: absolute;
        bottom: 22px;
        left: 0;
        right: 0;
        text-align: center;
        color: #475569;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
      }
      @keyframes appSplashFadeIn {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes appSplashBar {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash,
        #app-splash .plate,
        #app-splash .app-name,
        #app-splash .loading-msg { transition: none; animation-duration: 0.01ms; }
        #app-splash .bar::before { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="plate">
        <img src="/logo.png" alt="الأوتوماتيك اللبناني · مأكولات لبنانية" />
      </div>
      <div class="app-name">Automatic Restaurant OS</div>
      <div class="bar"></div>
      <div class="loading-msg">Loading restaurant data…</div>
      <div class="version">v%VITE_APP_VERSION%</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
